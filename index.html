<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAFE + C 极速版</title>
  <style>
    /* === 极速版样式：去除了所有复杂的渲染特效 === */
    
    body {
      /* 使用系统默认字体 */
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
      /* 纯色背景 */
      background-color: #e0f2fe; 
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      color: #333;
    }

    h1 { 
      text-align: center; 
      color: #2563eb; 
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .container { 
      max-width: 1000px; 
      margin: auto; 
      background: #ffffff;
      padding: 20px;
      border-radius: 20px;
      border: 2px solid #bfdbfe;
    }

    .instructions {
      background: #fffbeb;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 2px solid #fcd34d;
      color: #92400e;
    }
    .instructions p { margin: 5px 0; }

    /* 话题网格 */
    .topics {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .topic {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 140px;
      transition: background-color 0.2s;
      /* 关键修改：移除了所有针对 .bad 类的样式，所有卡片初始外观完全一致 */
    }

    .topic:hover { 
      background-color: #f1f5f9;
      border-color: #cbd5e1;
    }

    .topic-emoji {
      font-size: 3rem;
      margin-bottom: 8px;
      line-height: 1;
    }

    .topic div:last-child { 
      font-weight: bold; 
      font-size: 1rem; 
      color: #475569; 
    }

    /* 只有被选中的正确话题才会变色 */
    .topic.selected { 
      background-color: #dcfce7;
      border-color: #22c55e;
      position: relative;
    }
    .topic.selected::after {
      content: "✓";
      position: absolute;
      top: 5px;
      right: 8px;
      color: #22c55e;
      font-weight: bold;
    }

    /* 按钮优化 */
    .buttons { display: flex; justify-content: center; gap: 15px; margin: 25px 0; flex-wrap: wrap; }
    
    button {
      padding: 12px 30px;
      font-size: 1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      border-bottom: 4px solid #1d4ed8; 
    }
    button:active { 
      transform: translateY(2px); 
      border-bottom-width: 2px;
      margin-top: 2px;
    }
    button:disabled { 
      background: #94a3b8; 
      border-bottom-color: #64748b; 
      cursor: not-allowed; 
    }
    
    .btn-reset { background: #f59e0b; border-bottom-color: #b45309; }
    .btn-shuffle { background: #ec4899; border-bottom-color: #be185d; }

    /* 拖拽区域 */
    .drag-area { 
      display: none; 
      background: #f0f9ff; 
      padding: 20px; 
      border-radius: 20px;
      border: 3px dashed #3b82f6;
      margin-top: 30px;
    }

    .drag-topics {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 30px;
      justify-content: center;
      min-height: 100px;
    }

    .drag {
      background: white;
      padding: 10px;
      border: 2px solid #cbd5e0;
      border-radius: 10px;
      cursor: grab;
      width: 100px;
      text-align: center;
    }

    .zones {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    .zone {
      background: #fff;
      border: 2px dashed #94a3b8;
      border-radius: 15px;
      padding: 10px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .zone.drag-over { background: #dbeafe; border-color: #2563eb; }
    .zone h3 { font-size: 0.95rem; color: #2563eb; margin: 10px 0; }

    /* 弹窗简化 */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); 
      z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      max-width: 350px;
      border: 4px solid #ef4444;
    }

    .principle {
      display: none;
      margin-top: 30px;
      padding: 30px;
      background: #f0fdf4;
      border-radius: 20px;
      border: 4px solid #22c55e;
      text-align: center;
    }

    /* 辅助类 */
    .dragged-out { display: none; }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    /* 音频测试按钮 */
    .audio-test {
      position: fixed;
      top: 10px; right: 10px;
      background: #ef4444;
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<button class="audio-test" onclick="testAllSounds()">🔊 声音</button>

<div class="container">
  <h1>🎮 SAFE + C 分类挑战</h1>

  <div class="instructions">
    <p>🌟 <b>任务一：</b> 点选适合聊天的话题（SAFE+C）。</p>
    <p>📦 <b>任务二：</b> 点击"开始分类"，拖拽话题到盒子里。</p>
  </div>

  <div class="topics" id="topics"></div>

  <div class="buttons">
    <button id="startBtn" onclick="goDrag()" disabled>➡️ 开始分类</button>
    <button class="btn-reset" onclick="resetSelection()">🔄 重置</button>
    <button class="btn-shuffle" onclick="reshuffleTopics()">🔀 乱序</button>
  </div>

  <div class="drag-area" id="dragArea">
    <h2 style="text-align: center; color: #2563eb; margin-bottom: 20px;">🎯 归类大作战</h2>
    <div class="drag-topics" id="dragTopics"></div>

    <div class="zones">
      <div class="zone" data-zone="Sport"><h3>🏀 Sport</h3></div>
      <div class="zone" data-zone="Art"><h3>🎨 Art</h3></div>
      <div class="zone" data-zone="Food"><h3>🍜 Food</h3></div>
      <div class="zone" data-zone="Entertainment & Environment"><h3>🎬 Ent. & Env.</h3></div>
      <div class="zone" data-zone="Chongqing Specials"><h3>🌶️ Chongqing</h3></div>
    </div>

    <div class="buttons">
      <button onclick="showRule()" style="background: #22c55e; border-bottom-color: #15803d;">🏆 完成</button>
      <button class="btn-reset" onclick="resetDrag()">🔄 重新</button>
    </div>
  </div>

  <div class="principle" id="principle">
    <h2 style="color: #2563eb;">🎉 太棒了！</h2>
    <div style="font-size: 1.2rem; line-height: 1.8; text-align: left; display: inline-block;">
      <strong>S</strong> – Sport（运动）<br>
      <strong>A</strong> – Art（艺术）<br>
      <strong>F</strong> – Food（食物）<br>
      <strong>E</strong> – Entertainment & Environment<br>
      <strong>C</strong> – Chongqing Specials
    </div>
  </div>
</div>

<div class="modal" id="warningModal">
  <div class="modal-content">
    <h2 style="font-size: 3rem; margin: 0;">🚫</h2>
    <h3>哎呀！</h3>
    <p>这个话题不太合适哦（隐私或负面）。</p>
    <button onclick="closeModal()" style="background: #ef4444; border-bottom-color: #b91c1c; margin-top: 15px;">好的</button>
  </div>
</div>

<script>
  // === 极简化的音效系统 ===
  class SoundSystem {
    constructor() {
      this.ctx = null;
    }
    init() {
      if (!this.ctx) {
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          this.ctx = new AC();
        } catch(e) { console.log('Audio disabled'); }
      }
    }
    beep(freq, duration, type='sine') {
      if (!this.ctx) this.init();
      if (!this.ctx) return;
      try {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.frequency.value = freq;
        osc.type = type;
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime); 
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      } catch(e) {}
    }
    playCorrect() { this.beep(880, 0.1); setTimeout(()=>this.beep(1760, 0.1), 100); }
    playError() { this.beep(150, 0.3, 'sawtooth'); }
    playClick() { this.beep(400, 0.05, 'square'); }
    playSuccess() { 
      [523, 659, 784].forEach((f, i) => setTimeout(() => this.beep(f, 0.2), i*200)); 
    }
  }

  const sound = new SoundSystem();
  document.body.addEventListener('click', () => sound.init(), {once:true});
  window.testAllSounds = () => sound.playSuccess();

  // === 游戏数据 ===
  const allTopics = [
    { html: '<div class="topic-emoji">🏀</div><div>Basketball</div>', cat: 'Sport', bad: false },
    { html: '<div class="topic-emoji">🏃</div><div>Running</div>', cat: 'Sport', bad: false },
    { html: '<div class="topic-emoji">🎨</div><div>Painting</div>', cat: 'Art', bad: false },
    { html: '<div class="topic-emoji">🎬</div><div>Movies</div>', cat: 'Art', bad: false },
    { html: '<div class="topic-emoji">🍲</div><div>Hot Pot</div>', cat: 'Food', bad: false },
    { html: '<div class="topic-emoji">🍅</div><div>Tomato Egg</div>', cat: 'Food', bad: false },
    { html: '<div class="topic-emoji">🌍</div><div>Travel</div>', cat: 'Entertainment & Environment', bad: false },
    { html: '<div class="topic-emoji">☀️</div><div>Weather</div>', cat: 'Entertainment & Environment', bad: false },
    { html: '<div class="topic-emoji">🏙️</div><div>Jiefangbei</div>', cat: 'Chongqing Specials', bad: false },
    { html: '<div class="topic-emoji">🏯</div><div>Ciqikou</div>', cat: 'Chongqing Specials', bad: false },
    { html: '<div class="topic-emoji">📅</div><div>Age</div>', cat: '', bad: true },
    { html: '<div class="topic-emoji">⚖️</div><div>Weight</div>', cat: '', bad: true },
    { html: '<div class="topic-emoji">💰</div><div>Money</div>', cat: '', bad: true },
    { html: '<div class="topic-emoji">🗣️</div><div>Arguments</div>', cat: '', bad: true }
  ];

  // === 逻辑控制 ===
  const topicsEl = document.getElementById('topics');
  const dragArea = document.getElementById('dragArea');
  const dragTopics = document.getElementById('dragTopics');
  const modal = document.getElementById('warningModal');
  const startBtn = document.getElementById('startBtn');
  let draggedItem = null;

  function init() {
    topicsEl.innerHTML = '';
    allTopics.sort(() => Math.random() - 0.5).forEach(t => {
      const div = document.createElement('div');
      // 注意：虽然这里保留了 bad 类名用于逻辑判断，但 CSS 中已没有针对 .bad 的样式
      div.className = `topic ${t.bad ? 'bad' : ''}`;
      div.innerHTML = t.html;
      div.dataset.cat = t.cat;
      div.dataset.bad = t.bad;
      div.onclick = () => {
        sound.init();
        if (t.bad) {
          // 点击了负面话题：报错、弹窗，但不改变外观
          sound.playError();
          modal.style.display = 'flex';
        } else {
          // 点击了正确话题：变绿
          div.classList.toggle('selected');
          if(div.classList.contains('selected')) sound.playCorrect();
          else sound.playClick();
          updateBtn();
        }
      };
      topicsEl.appendChild(div);
    });
  }

  function updateBtn() {
    const count = document.querySelectorAll('.topic.selected').length;
    startBtn.disabled = count === 0;
    startBtn.textContent = count > 0 ? `➡️ 开始分类 (${count})` : '➡️ 开始分类';
  }

  window.closeModal = () => modal.style.display = 'none';
  window.resetSelection = () => {
    sound.playClick();
    document.querySelectorAll('.topic.selected').forEach(e => e.classList.remove('selected'));
    updateBtn();
    dragArea.style.display = 'none';
  };
  window.reshuffleTopics = () => { sound.playClick(); init(); updateBtn(); };

  window.goDrag = () => {
    sound.playClick();
    dragTopics.innerHTML = '';
    const selected = document.querySelectorAll('.topic.selected');
    selected.forEach(s => {
      const d = document.createElement('div');
      d.className = 'drag';
      d.draggable = true;
      d.innerHTML = s.innerHTML;
      d.dataset.cat = s.dataset.cat;
      d.ondragstart = () => draggedItem = d;
      dragTopics.appendChild(d);
    });
    dragArea.style.display = 'block';
    dragArea.scrollIntoView({behavior:'smooth'});
    initZones();
  };

  function initZones() {
    document.querySelectorAll('.zone').forEach(z => {
      z.ondragover = e => { e.preventDefault(); z.classList.add('drag-over'); };
      z.ondragleave = () => z.classList.remove('drag-over');
      z.ondrop = e => {
        e.preventDefault();
        z.classList.remove('drag-over');
        if (draggedItem && draggedItem.dataset.cat === z.dataset.zone) {
          sound.playCorrect();
          const clone = draggedItem.cloneNode(true);
          clone.draggable = false;
          clone.style.width = '90%'; clone.style.marginBottom = '5px';
          z.appendChild(clone);
          draggedItem.remove();
        } else {
          sound.playError();
          draggedItem.style.animation = 'shake 0.4s';
          setTimeout(() => draggedItem.style.animation = '', 400);
        }
      };
    });
  }

  window.showRule = () => {
    sound.playSuccess();
    document.getElementById('principle').style.display = 'block';
    document.getElementById('principle').scrollIntoView({behavior:'smooth'});
  };
  
  window.resetDrag = () => {
    document.querySelectorAll('.zone .drag').forEach(e => e.remove());
    goDrag();
  };

  init();
</script>
</body>
</html>
